services:
  backend:
    image: ${DOCKERHUB_USERNAME:-trunganh0106}/${IMAGE_BACKEND:-chess-bot-backend}:latest
    container_name: ${APP_NAME:-chess-backend}
    ports:
      - "9999:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
