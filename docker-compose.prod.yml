services:
  backend:
    image: ${DOCKERHUB_USERNAME:-trunganh0106}/${IMAGE_BACKEND:-chess-bot-backend}:latest
    container_name: ${APP_NAME}
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}.tls=true"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=8000"
      
      # Shipyard config
      - "shipyard.managed=true"
      - "shipyard.project=${APP_NAME}"
      - "shipyard.domain=${APP_DOMAIN}"

networks:
  proxy:
    external: true
