name: CI/CD Pipeline - Test & Deploy to GHCR

on:
  push:
    branches:
      - main
      - prod
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────
  # CI: Test, Lint and Type Check Backend and Frontend
  # ─────────────────────────────────────────────────────────
  ci:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Backend CI ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Backend/requirements.txt'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt

      - name: Run Backend Unit Tests
        run: |
          python -m unittest discover -s Backend/tests

      # --- Frontend CI ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./Frontend
        run: npm ci

      - name: Run Frontend Linter
        working-directory: ./Frontend
        run: npm run lint

      - name: Run Frontend Type Check
        working-directory: ./Frontend
        run: npx tsc --noEmit

      - name: Run Frontend Build Test
        working-directory: ./Frontend
        run: npm run build

  # ─────────────────────────────────────────────────────────
  # CD: Build and Push Multi-arch Docker Images to GHCR
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build and Push to GHCR
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase repository name for GHCR compatibility
        run: |
          echo "IMAGE_REPOSITORY_LC=${REPOSITORY,,}" >> $GITHUB_ENV
        env:
          REPOSITORY: 'ghcr.io/${{ github.repository }}'

      - name: Set up QEMU (for multi-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        run: |
          echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REPOSITORY_LC }}/backend:latest
            ${{ env.IMAGE_REPOSITORY_LC }}/backend:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE_REPOSITORY_LC }}/backend:${{ steps.meta.outputs.date }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPOSITORY_LC }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPOSITORY_LC }}/backend:buildcache,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REPOSITORY_LC }}/frontend:latest
            ${{ env.IMAGE_REPOSITORY_LC }}/frontend:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE_REPOSITORY_LC }}/frontend:${{ steps.meta.outputs.date }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPOSITORY_LC }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPOSITORY_LC }}/frontend:buildcache,mode=max
